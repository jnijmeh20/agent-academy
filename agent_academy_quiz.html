<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Academy – AI Agents Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #000048;
    --navy-mid: #000048;
    --navy-light: #0d0d6b;
    --blue: #2F78C4;
    --blue-light: #1976D2;
    --teal: #05819B;
    --white: #ffffff;
    --off-white: #f4f6fa;
    --gray-light: #e8ecf3;
    --gray-mid: #8a94a8;
    --selected: #E3F0FF;
    --selected-border: #2F78C4;
    --correct: #1db87e;
    --correct-bg: #e6f9f2;
    --incorrect: #e0455a;
    --incorrect-bg: #fdeef0;
    --radius: 10px;
    --font: 'DM Sans', system-ui, sans-serif;
    --mono: 'DM Mono', monospace;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: var(--font);
    background: var(--off-white);
    color: var(--navy);
  }

  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 0;
    min-height: 100vh;
  }

  .quiz-wrap {
    width: 100%;
    max-width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .quiz-header {
    background: var(--navy);
    padding: 28px 36px 24px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .quiz-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: var(--teal);
    opacity: 0.07;
  }
  .quiz-eyebrow {
    font-family: var(--mono);
    font-size: 15px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6AA2DC;
    margin-bottom: 6px;
  }
  .quiz-title {
    font-size: 26px;
    font-weight: 600;
    color: #6AA2DC;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .quiz-subtitle {
    font-size: 19px;
    color: #92BBE6;
    line-height: 1.5;
  }

  /* Progress */
  .progress-bar-wrap {
    background: var(--navy-mid);
    height: 4px;
    flex-shrink: 0;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--teal);
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Body */
  .quiz-body {
    background: var(--white);
    padding: 32px 40px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* Question meta */
  .q-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    flex-shrink: 0;
  }
  .q-counter {
    font-family: var(--mono);
    font-size: 17px;
    color: var(--gray-mid);
    letter-spacing: 0.06em;
  }
  .q-counter span { color: #2F78C4; font-weight: 500; }

  .q-dots {
    display: flex;
    gap: 6px;
  }
  .q-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gray-light);
    transition: background 0.2s;
  }
  .q-dot.active { background: var(--blue); }
  .q-dot.done { background: var(--teal); }

  /* Question text */
  .q-text {
    font-size: 22px;
    font-weight: 500;
    line-height: 1.6;
    color: var(--navy);
    margin-bottom: 22px;
    flex-shrink: 0;
  }

  /* Options */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
    flex: 1;
  }

  .option-btn {
    width: 100%;
    text-align: left;
    padding: 14px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--gray-light);
    background: var(--off-white);
    font-family: var(--font);
    font-size: 20px;
    color: var(--navy);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    line-height: 1.45;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--blue);
    background: var(--selected);
  }
  .option-btn.selected {
    border-color: var(--selected-border);
    background: var(--selected);
    color: var(--navy);
  }
  .option-btn.selected .opt-letter { color: var(--blue); }
  .option-btn:disabled { cursor: default; }

  /* Results state styling */
  .option-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: #0d5c3a;
  }
  .option-btn.correct .opt-letter { color: var(--correct); }
  .option-btn.incorrect {
    border-color: var(--incorrect);
    background: var(--incorrect-bg);
    color: #7a1b27;
  }
  .option-btn.incorrect .opt-letter { color: var(--incorrect); }
  .option-btn.reveal-correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: #0d5c3a;
    opacity: 0.75;
  }

  .opt-letter {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--gray-mid);
    min-width: 18px;
    margin-top: 1px;
  }

  /* Nav */
  .q-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .q-nav-hint {
    font-size: 18px;
    color: var(--gray-mid);
  }
  .next-btn {
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-family: var(--font);
    font-size: 19px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0.4;
    pointer-events: none;
  }
  .next-btn.active {
    opacity: 1;
    pointer-events: all;
  }
  .next-btn.active:hover { background: var(--navy-light); }
  .next-btn svg { width: 14px; height: 14px; }

  /* Results */
  .results-screen {
    display: none;
    flex-direction: column;
    align-items: center;
  }
  .results-screen.show { display: flex; }

  .score-ring {
    width: 100px;
    height: 100px;
    margin: 0 auto 20px;
    position: relative;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring circle { transition: stroke-dashoffset 0.8s ease; }
  .score-number {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    font-weight: 600;
    color: var(--navy);
    text-align: center;
  }
  .score-number span { font-size: 17px; color: var(--gray-mid); font-weight: 400; }

  .results-title {
    font-size: 26px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 6px;
    text-align: center;
  }
  .pass-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 16px;
    font-weight: 600;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .pass-badge.pass { background: var(--correct-bg); color: #0d5c3a; }
  .pass-badge.fail { background: var(--incorrect-bg); color: #7a1b27; }

  .results-subtitle {
    font-size: 19px;
    color: var(--gray-mid);
    line-height: 1.6;
    margin-bottom: 28px;
    max-width: 400px;
    text-align: center;
  }

  .results-breakdown {
    width: 100%;
    border: 1px solid var(--gray-light);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .breakdown-header {
    background: var(--off-white);
    padding: 10px 16px;
    font-size: 16px;
    font-weight: 600;
    color: var(--gray-mid);
    font-family: var(--mono);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--gray-light);
  }
  .breakdown-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--gray-light);
    font-size: 19px;
  }
  .breakdown-item:last-child { border-bottom: none; }
  .breakdown-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }
  .breakdown-icon.c { background: var(--correct); }
  .breakdown-icon.w { background: var(--incorrect); }
  .breakdown-icon svg { width: 10px; height: 10px; stroke: white; }
  .breakdown-q { color: var(--navy); line-height: 1.45; font-weight: 500; }
  .breakdown-your-answer { font-size: 17px; color: var(--gray-mid); margin-top: 3px; }
  .breakdown-your-answer.wrong { color: var(--incorrect); }

  .results-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .restart-btn {
    background: transparent;
    border: 1.5px solid var(--navy);
    color: var(--navy);
    border-radius: 8px;
    padding: 12px 28px;
    font-family: var(--font);
    font-size: 19px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .restart-btn:hover { background: var(--navy); color: var(--white); }

  .q-slide { animation: slideIn 0.22s ease; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="quiz-eyebrow">Agent Academy · AI Agents</div>
    <div class="quiz-title">Check your understanding</div>
    <div class="quiz-subtitle">6 questions · Select an answer to continue</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar"></div>
  </div>
  <div class="quiz-body">

    <div id="questionPanel">
      <div class="q-meta">
        <div class="q-counter">Question <span id="qNum">1</span> of 6</div>
        <div class="q-dots" id="qDots"></div>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="options-list" id="optionsList"></div>
      <div class="q-nav">
        <div class="q-nav-hint" id="navHint">Select an answer to continue</div>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
          <span id="nextBtnText">Next</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>

    <div class="results-screen" id="resultsPanel">
      <div class="score-ring">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="42" fill="none" stroke="#e8ecf3" stroke-width="7"/>
          <circle id="scoreArc" cx="50" cy="50" r="42" fill="none" stroke="#00b8a0" stroke-width="7"
            stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round"/>
        </svg>
        <div class="score-number" id="scoreNumber">0<br><span>/6</span></div>
      </div>
      <div class="pass-badge" id="passBadge"></div>
      <div class="results-title" id="resultsTitle"></div>
      <div class="results-subtitle" id="resultsSubtitle"></div>
      <div class="results-breakdown" id="resultsBreakdown"></div>
      <div class="results-actions">
        <button class="restart-btn" onclick="restartQuiz()">Retake quiz</button>
      </div>
    </div>

  </div>
</div>

<script>
(function() {
  var questions = [
    {
      text: "What is an AI agent?",
      options: [
        "A chatbot that answers questions using a knowledge base",
        "A software system that can perceive its environment, make decisions, and take actions to achieve a goal",
        "An automation tool that follows predefined rules to complete tasks",
        "A large language model that generates content in response to prompts"
      ],
      correct: 1,
      explanation: "An AI agent is defined by its ability to perceive its environment, make decisions, and take action toward a goal — not just generate a response."
    },
    {
      text: "Which of the following best describes the difference between a chatbot and an AI agent?",
      options: [
        "Chatbots are older technology; agents are newer",
        "Chatbots use AI; agents use traditional programming",
        "A chatbot focuses on conversation and responses; an agent focuses on actions and outcomes",
        "Agents can only be used by developers; chatbots are for everyone"
      ],
      correct: 2,
      explanation: "A chatbot's job ends when it responds. An agent stays oriented toward a goal and keeps working until the task is complete."
    },
    {
      text: "A company wants to automate their invoice approval process. Orders under $5,000 are auto-approved; orders above go to a manager. Every possible scenario is already mapped out. What is the better tool?",
      options: [
        "An AI agent, because it can handle decisions",
        "A multi-agent system, because approvals involve multiple people",
        "Traditional automation, because all decision paths are predictable and predefined",
        "A large language model, because it understands the content of invoices"
      ],
      correct: 2,
      explanation: "When every decision path is known in advance and conditions are stable, traditional automation is the right fit. Agents add value where rules cannot cover all scenarios."
    },
    {
      text: "What is the role of planning and reasoning in an AI agent?",
      options: [
        "It connects the agent to external APIs and databases",
        "It stores what the agent has already done so it doesn't repeat steps",
        "It breaks a high-level goal into a structured sequence of executable steps",
        "It checks whether the agent's last action was successful"
      ],
      correct: 2,
      explanation: "Planning turns a goal into something a system can actually execute. Without it, agents lose direction and act out of sequence."
    },
    {
      text: "Why does memory matter in a multi-step agent workflow?",
      options: [
        "It allows the agent to connect to more tools at once",
        "It helps the agent respond faster to user input",
        "It allows the agent to replace human workers entirely",
        "It lets the agent track what has happened, what is in progress, and what still needs to be done"
      ],
      correct: 3,
      explanation: "Without memory, every step is treated as a fresh start. Memory gives agents continuity across a workflow."
    },
    {
      text: "Which of the following is the strongest candidate for an agent-based approach?",
      options: [
        "Sending a scheduled weekly email to a fixed list",
        "Answering common HR questions from a knowledge base",
        "Converting uploaded files from one format to another",
        "Processing insurance claims by reviewing submissions, checking policy details, routing cases, and flagging fraud"
      ],
      correct: 3,
      explanation: "The claims process has multiple steps, requires access to different systems, involves context-dependent decisions, and needs speed at volume — exactly where agents excel."
    }
  ];

  var current = 0;
  var selected = [];
  var userAnswers = [];

  function init() {
    var panel = document.getElementById('questionPanel');
    if (!panel) return;

    for (var i = 0; i < questions.length; i++) {
      selected.push(-1);
      userAnswers.push(-1);
    }

    buildDots();
    renderQuestion();
  }

  function buildDots() {
    var wrap = document.getElementById('qDots');
    wrap.innerHTML = '';
    for (var i = 0; i < questions.length; i++) {
      var d = document.createElement('div');
      d.className = 'q-dot';
      d.id = 'dot-' + i;
      wrap.appendChild(d);
    }
  }

  function updateDots() {
    for (var i = 0; i < questions.length; i++) {
      var d = document.getElementById('dot-' + i);
      if (!d) continue;
      d.className = 'q-dot';
      if (i === current) d.classList.add('active');
      else if (userAnswers[i] !== -1) d.classList.add('done');
    }
  }

  function renderQuestion() {
    var q = questions[current];
    document.getElementById('qNum').textContent = current + 1;
    document.getElementById('progressBar').style.width = ((current / questions.length) * 100) + '%';

    var panel = document.getElementById('questionPanel');
    panel.classList.remove('q-slide');
    void panel.offsetWidth;
    panel.classList.add('q-slide');

    document.getElementById('qText').textContent = q.text;

    var list = document.getElementById('optionsList');
    list.innerHTML = '';
    var letters = ['A', 'B', 'C', 'D'];

    for (var i = 0; i < q.options.length; i++) {
      (function(idx) {
        var div = document.createElement('div');
        var btn = document.createElement('button');
        btn.className = 'option-btn';
        if (selected[current] === idx) btn.classList.add('selected');
        btn.innerHTML = '<span class="opt-letter">' + letters[idx] + '</span><span>' + q.options[idx] + '</span>';
        btn.onclick = function() { selectAnswer(idx); };
        div.appendChild(btn);
        list.appendChild(div);
      })(i);
    }

    var nb = document.getElementById('nextBtn');
    if (selected[current] !== -1) {
      nb.classList.add('active');
      document.getElementById('navHint').textContent = '';
    } else {
      nb.classList.remove('active');
      document.getElementById('navHint').textContent = 'Select an answer to continue';
    }

    document.getElementById('nextBtnText').textContent = current === questions.length - 1 ? 'See results' : 'Next';
    updateDots();
  }

  function selectAnswer(index) {
    selected[current] = index;

    var buttons = document.querySelectorAll('.option-btn');
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].classList.remove('selected');
    }
    buttons[index].classList.add('selected');

    document.getElementById('nextBtn').classList.add('active');
    document.getElementById('navHint').textContent = '';
  }

  function nextQuestion() {
    if (selected[current] === -1) return;
    userAnswers[current] = selected[current];
    current++;
    if (current >= questions.length) {
      showResults();
    } else {
      renderQuestion();
    }
  }

  function showResults() {
    document.getElementById('questionPanel').style.display = 'none';
    document.getElementById('progressBar').style.width = '100%';

    var panel = document.getElementById('resultsPanel');
    panel.classList.add('show');

    var score = 0;
    for (var i = 0; i < questions.length; i++) {
      if (userAnswers[i] === questions[i].correct) score++;
    }

    var passed = score >= 4;
    var pct = score / questions.length;
    var circumference = 264;
    var offset = circumference - (pct * circumference);

    document.getElementById('scoreNumber').innerHTML = score + '<br><span>/' + questions.length + '</span>';

    setTimeout(function() {
      var arc = document.getElementById('scoreArc');
      arc.style.strokeDashoffset = offset;
      arc.style.stroke = passed ? '#1db87e' : '#e0455a';
    }, 100);

    var badge = document.getElementById('passBadge');
    badge.textContent = passed ? 'Passed' : 'Not passed';
    badge.className = 'pass-badge ' + (passed ? 'pass' : 'fail');

    document.getElementById('resultsTitle').textContent = passed ? 'Well done.' : 'Worth another look.';
    document.getElementById('resultsSubtitle').textContent = passed
      ? 'You have a solid understanding of the Agent Foundations module. You are ready to move on.'
      : 'You need 4 out of 6 to pass. Review the lessons and give it another try.';

    var bd = document.getElementById('resultsBreakdown');
    bd.innerHTML = '<div class="breakdown-header">Question review</div>';

    var checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    var crossSvg = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

    for (var i = 0; i < questions.length; i++) {
      var isCorrect = userAnswers[i] === questions[i].correct;
      var item = document.createElement('div');
      item.className = 'breakdown-item';
      var qShort = questions[i].text.length > 70 ? questions[i].text.substring(0, 70) + '…' : questions[i].text;
      var yourAnswerText = userAnswers[i] !== -1 ? questions[i].options[userAnswers[i]] : 'Not answered';
      var yourAnswerShort = yourAnswerText.length > 60 ? yourAnswerText.substring(0, 60) + '…' : yourAnswerText;
      item.innerHTML = '<div class="breakdown-icon ' + (isCorrect ? 'c' : 'w') + '">' + (isCorrect ? checkSvg : crossSvg) + '</div>'
        + '<div><div class="breakdown-q">Q' + (i + 1) + ': ' + qShort + '</div>'
        + '<div class="breakdown-your-answer' + (isCorrect ? '' : ' wrong') + '">'
        + (isCorrect ? 'Correct' : 'Your answer: ' + yourAnswerShort)
        + '</div></div>';
      bd.appendChild(item);
    }
  }

  function restartQuiz() {
    current = 0;
    selected = [];
    userAnswers = [];
    for (var i = 0; i < questions.length; i++) {
      selected.push(-1);
      userAnswers.push(-1);
    }
    document.getElementById('questionPanel').style.display = 'block';
    document.getElementById('resultsPanel').classList.remove('show');
    renderQuestion();
  }

  window.nextQuestion = nextQuestion;
  window.restartQuiz = restartQuiz;

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
