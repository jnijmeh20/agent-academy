<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Academy – Module 1 Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a1628;
    --navy-mid: #162240;
    --navy-light: #1e3258;
    --teal: #00b8a0;
    --teal-dim: #007d6d;
    --white: #ffffff;
    --off-white: #f4f6fa;
    --gray-light: #e8ecf3;
    --gray-mid: #8a94a8;
    --correct: #1db87e;
    --correct-bg: #e6f9f2;
    --incorrect: #e0455a;
    --incorrect-bg: #fdeef0;
    --radius: 10px;
    --font: 'DM Sans', system-ui, sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--off-white);
    color: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px 60px;
  }

  .quiz-wrap {
    width: 100%;
    max-width: 720px;
  }

  /* Header */
  .quiz-header {
    background: var(--navy);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 32px 36px 28px;
    position: relative;
    overflow: hidden;
  }
  .quiz-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: var(--teal);
    opacity: 0.07;
  }
  .quiz-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 8px;
  }
  .quiz-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--white);
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .quiz-subtitle {
    font-size: 14px;
    color: var(--gray-mid);
    line-height: 1.5;
  }

  /* Progress */
  .progress-bar-wrap {
    background: var(--navy-mid);
    height: 4px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--teal);
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Body */
  .quiz-body {
    background: var(--white);
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 36px;
    border: 1px solid var(--gray-light);
    border-top: none;
  }

  /* Question meta */
  .q-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .q-counter {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--gray-mid);
    letter-spacing: 0.06em;
  }
  .q-counter span {
    color: var(--teal-dim);
    font-weight: 500;
  }

  /* Question text */
  .q-text {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.55;
    color: var(--navy);
    margin-bottom: 24px;
  }

  /* Options */
  .options-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .option-btn {
    width: 100%;
    text-align: left;
    padding: 14px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--gray-light);
    background: var(--off-white);
    font-family: var(--font);
    font-size: 14.5px;
    color: var(--navy);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    line-height: 1.45;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--teal);
    background: #f0fdf9;
    transform: translateX(2px);
  }
  .option-btn .opt-letter {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-mid);
    min-width: 18px;
    margin-top: 1px;
    transition: color 0.15s;
  }
  .option-btn:hover:not(:disabled) .opt-letter { color: var(--teal-dim); }

  .option-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: #0d5c3a;
  }
  .option-btn.correct .opt-letter { color: var(--correct); }

  .option-btn.incorrect {
    border-color: var(--incorrect);
    background: var(--incorrect-bg);
    color: #7a1b27;
  }
  .option-btn.incorrect .opt-letter { color: var(--incorrect); }

  .option-btn.reveal-correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: #0d5c3a;
    opacity: 0.7;
  }
  .option-btn.reveal-correct .opt-letter { color: var(--correct); }

  .option-btn:disabled { cursor: default; transform: none; }

  /* Feedback */
  .feedback-box {
    display: none;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.55;
    margin-bottom: 24px;
    border-left: 3px solid transparent;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct-fb {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #0d5c3a;
  }
  .feedback-box.incorrect-fb {
    background: var(--incorrect-bg);
    border-color: var(--incorrect);
    color: #7a1b27;
  }
  .feedback-label {
    font-weight: 600;
    margin-bottom: 4px;
    display: block;
  }

  /* Nav */
  .q-nav {
    display: flex;
    justify-content: flex-end;
  }
  .next-btn {
    display: none;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .next-btn:hover { background: var(--navy-light); transform: translateY(-1px); }
  .next-btn.show { display: flex; align-items: center; gap: 8px; }
  .next-btn svg { width: 14px; height: 14px; }

  /* Results */
  .results-screen {
    display: none;
    text-align: center;
    padding: 20px 0 10px;
  }
  .results-screen.show { display: block; }

  .score-ring {
    width: 110px;
    height: 110px;
    margin: 0 auto 24px;
    position: relative;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring circle { transition: stroke-dashoffset 0.8s ease; }
  .score-number {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 26px;
    font-weight: 600;
    color: var(--navy);
  }
  .score-number span { font-size: 14px; color: var(--gray-mid); font-weight: 400; }

  .results-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .results-subtitle {
    font-size: 14px;
    color: var(--gray-mid);
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }

  .results-breakdown {
    text-align: left;
    border: 1px solid var(--gray-light);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .breakdown-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--gray-light);
    font-size: 13.5px;
  }
  .breakdown-item:last-child { border-bottom: none; }
  .breakdown-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }
  .breakdown-icon.c { background: var(--correct); }
  .breakdown-icon.w { background: var(--incorrect); }
  .breakdown-icon svg { width: 11px; height: 11px; stroke: white; }
  .breakdown-q { color: var(--navy); line-height: 1.45; }
  .breakdown-answer { font-size: 12.5px; color: var(--gray-mid); margin-top: 3px; }
  .breakdown-answer strong { color: var(--correct); }

  .restart-btn {
    background: transparent;
    border: 1.5px solid var(--navy);
    color: var(--navy);
    border-radius: 8px;
    padding: 11px 26px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .restart-btn:hover { background: var(--navy); color: var(--white); }

  /* Question slide animation */
  .q-slide {
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="quiz-eyebrow">Agent Academy · Module 1</div>
    <div class="quiz-title">Check your understanding</div>
    <div class="quiz-subtitle">6 questions covering the fundamentals of AI agents.</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar"></div>
  </div>
  <div class="quiz-body">

    <!-- Question panel -->
    <div id="questionPanel">
      <div class="q-meta">
        <div class="q-counter">Question <span id="qNum">1</span> of 6</div>
      </div>
      <div class="q-text" id="qText"></div>
      <ul class="options-list" id="optionsList"></ul>
      <div class="feedback-box" id="feedbackBox">
        <span class="feedback-label" id="feedbackLabel"></span>
        <span id="feedbackText"></span>
      </div>
      <div class="q-nav">
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
          <span id="nextBtnText">Next</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>

    <!-- Results panel -->
    <div class="results-screen" id="resultsPanel">
      <div class="score-ring">
        <svg width="110" height="110" viewBox="0 0 110 110">
          <circle cx="55" cy="55" r="46" fill="none" stroke="#e8ecf3" stroke-width="8"/>
          <circle id="scoreArc" cx="55" cy="55" r="46" fill="none" stroke="#00b8a0" stroke-width="8"
            stroke-dasharray="289" stroke-dashoffset="289" stroke-linecap="round"/>
        </svg>
        <div class="score-number" id="scoreNumber">0<span>/6</span></div>
      </div>
      <div class="results-title" id="resultsTitle"></div>
      <div class="results-subtitle" id="resultsSubtitle"></div>
      <div class="results-breakdown" id="resultsBreakdown"></div>
      <button class="restart-btn" onclick="restartQuiz()">Retake quiz</button>
    </div>

  </div>
</div>

<script>
const questions = [
  {
    text: "Which of the following best describes what makes a system an AI agent rather than a standard AI model?",
    options: [
      "It uses a larger language model with more parameters",
      "It can perceive its environment, make decisions, and take action toward a goal",
      "It responds to natural language and holds conversations",
      "It runs faster and processes requests in real time"
    ],
    correct: 1,
    feedback: "An AI agent is defined by its ability to perceive its environment, make decisions, and take action — not just generate a response. Size, speed, or language ability alone does not make something an agent."
  },
  {
    text: "A customer asks an AI system: 'Can you reschedule my meeting for next week?' The system suggests steps the customer should follow. A week later, the customer is still waiting for their meeting to be rescheduled. What does this tell you?",
    options: [
      "The AI system gave a poor quality response",
      "The system is an agent that failed to complete its task",
      "The system behaved like a chatbot, not an agent — it responded but did not act",
      "The system needed more context to understand the request"
    ],
    correct: 2,
    feedback: "A chatbot's job ends when it responds. An agent would have accessed the calendar, found available slots, confirmed with attendees, and updated the invite. The system described responded without acting — that is chatbot behavior, not agentic behavior."
  },
  {
    text: "An operations team wants to automate their purchase order approval process. Orders under $5,000 follow a fixed approval path; orders above $5,000 go to a senior manager. No exceptions exist. Which approach is the better fit?",
    options: [
      "An AI agent, because it can handle complex decisions",
      "Traditional automation, because all paths are predictable and predefined",
      "A large language model, because it understands natural language",
      "A multi-agent system, because approvals involve multiple people"
    ],
    correct: 1,
    feedback: "When every decision path is known in advance and conditions are stable, traditional automation is the right tool. It is predictable, auditable, and faster to build. Agents add value where rules cannot cover all the scenarios — this is not that case."
  },
  {
    text: "In an agent system, what is the primary role of the planning and reasoning component?",
    options: [
      "To store previous actions so the agent can remember what it did",
      "To connect the agent to external APIs and databases",
      "To evaluate whether the agent's last action was successful",
      "To break a high-level goal into a structured sequence of executable steps"
    ],
    correct: 3,
    feedback: "Planning is what turns a goal into something a system can act on. The orchestrator or frontman agent receives a goal, interprets what needs to happen, and creates a step-by-step plan. Without it, agents lose direction and act out of sequence."
  },
  {
    text: "An agent is midway through a multi-step workflow when it encounters an unexpected error. It retries with a different approach, completes the task, and flags the issue in a summary for human review. Which component made this behavior possible?",
    options: [
      "Tool use, because it needed to call external systems",
      "Perception, because it needed to read the error message",
      "Feedback and iteration, because it evaluated the outcome and adjusted",
      "Memory, because it remembered the steps it had already taken"
    ],
    correct: 2,
    feedback: "Feedback and iteration is what gives agents resilience. After each action, a well-designed agent checks whether it moved toward the goal. If not, it adjusts — retrying, trying a different path, or escalating. That is exactly what happened here."
  },
  {
    text: "Which of the following processes is the strongest candidate for an agent-based approach?",
    options: [
      "Sending a weekly automated summary email to a fixed distribution list",
      "Answering common HR questions from a knowledge base",
      "Reviewing insurance claims by pulling policy details, checking for missing information, routing cases, and flagging fraud risk",
      "Converting uploaded documents from PDF to Word format"
    ],
    correct: 2,
    feedback: "The insurance claims process has all the characteristics where agents excel: multiple steps, access to different systems, decisions that depend on context, and a need for speed at volume. The other options are better suited to automation, a chatbot, or a simple script."
  }
];

let current = 0;
let score = 0;
let answered = [];

function renderQuestion() {
  const q = questions[current];
  document.getElementById('qNum').textContent = current + 1;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressBar').style.width = ((current / questions.length) * 100) + '%';

  const panel = document.getElementById('questionPanel');
  panel.classList.remove('q-slide');
  void panel.offsetWidth;
  panel.classList.add('q-slide');

  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach(function(opt, i) {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="opt-letter">' + letters[i] + '</span><span>' + opt + '</span>';
    btn.onclick = function() { selectAnswer(i); };
    li.appendChild(btn);
    list.appendChild(li);
  });

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box';
  fb.querySelector('#feedbackLabel').textContent = '';
  fb.querySelector('#feedbackText').textContent = '';

  const nb = document.getElementById('nextBtn');
  nb.className = 'next-btn';
  nb.querySelector('#nextBtnText').textContent = current === questions.length - 1 ? 'See results' : 'Next question';
}

function selectAnswer(index) {
  const q = questions[current];
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(function(b) { b.disabled = true; });

  const isCorrect = index === q.correct;
  if (isCorrect) score++;
  answered.push({ q: q.text, chosen: q.options[index], correct: q.options[q.correct], isCorrect: isCorrect });

  buttons[index].classList.add(isCorrect ? 'correct' : 'incorrect');
  if (!isCorrect) {
    buttons[q.correct].classList.add('reveal-correct');
  }

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box show ' + (isCorrect ? 'correct-fb' : 'incorrect-fb');
  document.getElementById('feedbackLabel').textContent = isCorrect ? 'Correct.' : 'Not quite.';
  document.getElementById('feedbackText').textContent = q.feedback;

  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  document.getElementById('questionPanel').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';

  const panel = document.getElementById('resultsPanel');
  panel.classList.add('show');

  document.getElementById('scoreNumber').innerHTML = score + '<span>/' + questions.length + '</span>';

  const pct = score / questions.length;
  const circumference = 289;
  const offset = circumference - (pct * circumference);
  setTimeout(function() {
    document.getElementById('scoreArc').style.strokeDashoffset = offset;
  }, 100);

  let title, subtitle;
  if (pct === 1) {
    title = 'Perfect score.';
    subtitle = 'You have a solid grasp of the Agent Foundations material. You are ready to move on to the next module.';
  } else if (pct >= 0.67) {
    title = 'Good work.';
    subtitle = 'You understand the core concepts. Review the questions you missed before continuing to the next module.';
  } else {
    title = 'Worth revisiting.';
    subtitle = 'A few concepts did not land yet. Take another look at the lessons before moving on.';
  }
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsSubtitle').textContent = subtitle;

  const bd = document.getElementById('resultsBreakdown');
  bd.innerHTML = '';
  answered.forEach(function(a, i) {
    const div = document.createElement('div');
    div.className = 'breakdown-item';
    const checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    const crossSvg = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    div.innerHTML = '<div class="breakdown-icon ' + (a.isCorrect ? 'c' : 'w') + '">' + (a.isCorrect ? checkSvg : crossSvg) + '</div>'
      + '<div><div class="breakdown-q">Q' + (i+1) + ': ' + (a.q.length > 80 ? a.q.substring(0, 80) + '…' : a.q) + '</div>'
      + (a.isCorrect ? '' : '<div class="breakdown-answer">Correct answer: <strong>' + a.correct + '</strong></div>') + '</div>';
    bd.appendChild(div);
  });
}

function restartQuiz() {
  current = 0;
  score = 0;
  answered = [];
  document.getElementById('questionPanel').style.display = 'block';
  document.getElementById('resultsPanel').classList.remove('show');
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
